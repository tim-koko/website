{{ $index := .Get "index" }}
<div data-scroll class="accordeon-item">
<h3 class="accordeon-header" id="heading{{ $index }}">
    <button class="accordeon-button strong {{ if (ne $index 0) }} collapsed {{ end }}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ $index }}" aria-expanded="{{ if (eq $index 0) }}true{{ else }}false{{ end }}" aria-controls="collapse{{ $index }}">
    <div class="title">{{ .Get "title"}}</div> <div class="icon-plus flex-shrink-0 ms-auto me-3"></div>
    </button>
</h3>
<div id="collapse{{ $index }}" class="accordeon-collapse collapse {{ if (eq $index 0) }} show {{ end }}" aria-labelledby="heading{{ $index }}" data-bs-parent="#faqAccordeon">
    <div class="accordeon-body pb-6">
    {{ .Get "content" | markdownify }}
    {{ .Inner | markdownify }}
    </div>
</div>
</div>
